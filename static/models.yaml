components:
  schemas:
    AdvancedNetworkingConfiguration:
      type: object
      properties:
        programId:
          type: string
          example: "14"
          description: Identifier of the program. Unique within the space.
          readOnly: true
        environmentId:
          type: string
          description: Identifier of the environment. Unique within the space.
          readOnly: true
        networkInfrastructureId:
          type: string
          example: "123"
          description: Advanced network infrastructure used.
          readOnly: true
        nonProxyHosts:
          type: array
          description: A list of hosts that should be reached directly, bypassing the special VPN or egress routing. The patterns may start or end with a ''*'' for wildcards.
          items:
            type: string
          example:
            - "*.example.com"
            - "*.example.net"
        portForwards:
          type: array
          description: List of port forwarding rules
          items:
            $ref: "#/components/schemas/PortForwardRepresentation"
        advancedNetworkingEnabled:
          type: boolean
          description: Whether advanced networking is enabled in this environment
          default: false
          readOnly: true
        _links:
          type: object
          readOnly: true
          properties:
            self:
              $ref: "#/components/schemas/HalLink"
              description: This object's representation
      description: Describes the Advanced Networking configuration for an environment
    AdvancedNetworkingConfigurationList:
      type: object
      properties:
        _totalNumberOfItems:
          type: integer
          format: int32
          description: The total number of embedded items
        _embedded:
          type: object
          readOnly: true
          properties:
            networkingConfigurations:
              type: array
              items:
                $ref: "#/components/schemas/AdvancedNetworkingConfiguration"
        _links:
          type: object
          readOnly: true
          properties:
            next:
              $ref: "#/components/schemas/HalLink"
              description: The next page of results.
            prev:
              $ref: "#/components/schemas/HalLink"
              description: The previous page of results.
            self:
              $ref: "#/components/schemas/HalLink"
              description: This object's representation
    AllSSLCertificatesList:
      type: object
      properties:
        _totalNumberOfItems:
          type: integer
          format: int32
          description: The total number of embedded items
        _page:
          $ref: "#/components/schemas/RequestedPageDetails"
          description: Details of the requested page of items
        _embedded:
          type: object
          readOnly: true
          properties:
            certificates:
              type: array
              items:
                $ref: "#/components/schemas/SslCertificateRepresentation"
        _links:
          type: object
          readOnly: true
          properties:
            next:
              $ref: "#/components/schemas/HalLink"
              description: The next page of results.
            page:
              $ref: "#/components/schemas/HalLink"
              description: An arbitrary page of results.
            prev:
              $ref: "#/components/schemas/HalLink"
              description: The previous page of results.
            self:
              $ref: "#/components/schemas/HalLink"
              description: This object's representation
    BranchList:
      type: object
      properties:
        _totalNumberOfItems:
          type: integer
          format: int32
          description: The total number of embedded items
        _embedded:
          type: object
          readOnly: true
          properties:
            branches:
              type: array
              items:
                $ref: "#/components/schemas/RepositoryBranch"
        _links:
          type: object
          readOnly: true
          properties:
            next:
              $ref: "#/components/schemas/HalLink"
              description: The next page of results.
            prev:
              $ref: "#/components/schemas/HalLink"
              description: The previous page of results.
            self:
              $ref: "#/components/schemas/HalLink"
              description: This object's representation
    CreateDvCertificateBody:
      type: object
      required:
        - domainIds
      properties:
        name:
          type: string
          example: my-cert
          description: Name of the certificate
        domainIds:
          type: array
          description: List of domain IDs to associate with the certificate
          items:
            type: integer
            format: int64
    CreateOrUpdateSslCertificateBody:
      type: object
      required:
        - name
        - certificate
        - privateKey
        - chain
      properties:
        name:
          type: string
          description: The name of the new SSL Certificate.
        certificate:
          type: string
          description: The PEM-encoded certificate.
        privateKey:
          type: object
          properties:
            value:
              type: string
              description: Private key value
          description: The PEM-encoded private key.
        chain:
          type: string
          description: The PEM-encoded certificate chain.
    Createanewipallowlist:
      type: object
      required:
        - ipCidrSet
        - name
      properties:
        name:
          type: string
          example: NewYork Office
          description: Name of the IP Allowed List
        ipCidrSet:
          type: array
          example: "[\"11.22.33.44/28\", \"99.88.77.66/32\"]"
          description: IP CIDR Set
          uniqueItems: true
          items:
            type: string
          maxItems: 50
          minItems: 1
    DnsConfiguration:
      type: object
      required:
        - resolvers
      properties:
        resolvers:
          type: array
          description: List of remote DNS resolvers
          items:
            type: string
      description: DNS Information. Only applicable to VPN infrastructures.
    Domain:
      type: object
      required:
        - label
        - programId
      properties:
        deleted:
          type: boolean
          default: false
        id:
          type: integer
          format: int64
          description: id
        domainName:
          type: string
          example: customer.domain.com
          description: Name of the domain name
        label:
          type: string
          description: Domain label
        programId:
          type: integer
          format: int64
          description: Id of the program
        createdAt:
          type: integer
          format: int64
          description: Create date
        updatedAt:
          type: integer
          format: int64
          description: Last updated date
        deletedAt:
          type: integer
          format: int64
          description: Deleted At
        acmeValidationStatus:
          type: string
          example: NOT_VERIFIED
          description: Acme Validation Status
        adobeValidationStatus:
          type: string
          example: NOT_VERIFIED
          description: Adobe Validation Status
        acmeValidationToken:
          type: string
          description: Acme Validation Token
        adobeValidationToken:
          type: string
          description: Adobe Validation Token
      description: A Domain representation
    DomainCreate:
      type: object
      properties:
        domainName:
          type: string
          example: customer.domain.com
          description: Name of the domain name
      description: A Domain representation for creating a domain
    DomainTokenValidationBody:
      type: object
      properties:
        validationType:
          type: string
          example: acme
          description: Type of the validation
          enum:
            - acme
            - adobe
      description: The json body for token validation
    EmbeddedProgram:
      type: object
      properties:
        id:
          type: string
          example: "14"
          description: Identifier of the program. Unique within the space.
          readOnly: true
        name:
          type: string
          example: AcmeCorp Main Site
          description: Name of the program
          readOnly: true
        enabled:
          type: boolean
          description: Whether this Program has been enabled for Cloud Manager usage
          default: false
          readOnly: true
        tenantId:
          type: string
          example: acmeCorp
          description: Tenant Id
          readOnly: true
        status:
          type: string
          description: Status of the program
          enum:
            - creating
            - ready
            - deleting
            - deleted
            - deleted_failed
            - failed
        createdAt:
          type: string
          format: date-time
          description: Created time
        updatedAt:
          type: string
          format: date-time
          description: Date of last change
        _links:
          type: object
          readOnly: true
          properties:
            http://ns.adobe.com/adobecloud/rel/tenant:
              description: The tenant this program belongs to
              $ref: "#/components/schemas/HalLink"
            self:
              $ref: "#/components/schemas/HalLink"
              description: This object's representation
      description: A lightweight representation of a Program
    EnableAdvancedNetworkingConfiguration:
      type: object
      properties:
        nonProxyHosts:
          type: array
          description: A list of hosts that should be reached directly, bypassing the special VPN or egress routing. The patterns may start or end with a ''*'' for wildcards.
          items:
            type: string
          example:
            - "*.example.com"
            - "*.example.net"
        portForwards:
          type: array
          description: List of port forwarding rules
          items:
            $ref: "#/components/schemas/PortForwardRepresentation"
    Environment:
      type: object
      properties:
        id:
          type: string
          description: id
        programId:
          type: string
          example: "14"
          description: Identifier of the program. Unique within the space.
        name:
          type: string
          example: AcmeCorp Dev1 Environment
          description: Name of the environment
          pattern: (?=.*[a-zA-Z])[-+!'"/#$%&*.,;()@-} 0-9]*
        description:
          type: string
          example: This is our primary development environment
          description: Description of the environment
        type:
          type: string
          example: dev
          description: Type of the environment
          enum:
            - dev
            - stage
            - prod
            - rde
            - preprod
        status:
          type: string
          example: creating
          description: Status of the environment
          enum:
            - creating
            - ready
            - deleting
            - deleted
            - updating
            - failed
            - deploy_failed
            - created
            - restoring
            - restore_failed
            - resetting
            - reset_failed
            - degraded
            - hibernated
        region:
          type: string
          example: va7
          description: Region of the environment
        availableLogOptions:
          type: array
          description: List of logs available in the environment
          items:
            $ref: "#/components/schemas/LogOptionRepresentation"
        _links:
          type: object
          readOnly: true
          properties:
