    IpSecPolicyInfrastructure:
      type: object
      required:
        - dhGroup
        - ikeEncryption
        - ikeIntegrity
        - ipsecEncryption
        - ipsecIntegrity
        - pfsGroup
        - saDatasize
        - saLifetime
      properties:
        dhGroup:
          type: string
          description: DH Group
          enum:
            - DHGroup24
            - ECP384
            - ECP256
            - DHGroup14
            - DHGroup2048
            - DHGroup2
            - DHGroup1
            - None
        ikeEncryption:
          type: string
          description: IKEv2 Encryption
          enum:
            - AES256
            - AES192
            - AES128
            - DES3
            - DES
        ikeIntegrity:
          type: string
          description: IKEv2 Integrity
          enum:
            - SHA384
            - SHA256
            - SHA1
            - MD5
        ipsecEncryption:
          type: string
          description: IPsec Encryption
          enum:
            - GCMAES256
            - GCMAES192
            - GCMAES128
            - AES256
            - AES192
            - AES128
            - DES3
            - DES
            - None
        ipsecIntegrity:
          type: string
          description: IPsec Integrity
          enum:
            - GCMAES256
            - GCMAES192
            - GCMAES128
            - SHA256
            - SHA1
            - MD5
        pfsGroup:
          type: string
          description: PFS Group
          enum:
            - PFS24
            - ECP384
            - ECP256
            - PFS2048
            - PFS2
            - PFS1
            - None
        saDatasize:
          type: integer
          format: int64
          description: QM SA Lifetime in KBytes under 1024
          minimum: 1024
        saLifetime:
          type: integer
          format: int32
          description: QM SA Lifetime in Seconds, minimum 300
          minimum: 300
